<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Dice</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #6a1b9a; /* Einfarbiger lilaner Hintergrund */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        header {
            text-align: center;
            padding: 25px 20px 10px 20px;
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: #ffeb3b;
            font-size: 4.5rem;
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 
                3px 3px 0px #000, 
                -1px -1px 0px #000,  
                1px -1px 0px #000,
                -1px 1px 0px #000,
                1px 1px 0px #000,
                5px 5px 10px rgba(0,0,0,0.6);
        }

        .main-container {
            display: flex;
            flex: 1;
            justify-content: space-between;
            padding: 20px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .sidebar {
            width: 320px;
            min-height: 280px; 
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            align-self: flex-start; 
            margin-top: 50px; 
            box-sizing: border-box;
        }

        .sidebar h2 {
            font-family: 'Permanent Marker', cursive; 
            color: #ffeb3b;
            font-size: 1.8rem;
            border-bottom: 2px solid #ffeb3b;
            padding-bottom: 8px;
            margin-top: 0;
        }

        .streamer-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .streamer-list li {
            padding: 12px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .streamer-list a {
            color: #00e5ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.15rem; 
        }

        .streamer-list a:hover {
            text-decoration: underline;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            min-width: 300px;
        }

        .controls-top {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls-top select {
            padding: 5px 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .bg-upload-btn {
            background-color: #ffffff;
            color: #333;
            border: none;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .bg-upload-btn:hover {
            background-color: #e0e0e0;
        }

        .dice-container {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
            perspective: 1000px;
        }

        .dice {
            width: 95px;
            height: 95px;
            background-color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                3px 3px 0px rgba(0, 0, 0, 0.3),
                6px 6px 0px rgba(0, 0, 0, 0.2),
                9px 9px 15px rgba(0, 0, 0, 0.4),
                inset -4px -4px 12px rgba(0, 0, 0, 0.2),
                inset 4px 4px 12px rgba(255, 255, 255, 0.4);
            transition: background-color 0.15s, transform 0.1s;
        }

        .dice.rolling {
            animation: rollAnimation 0.6s ease-out;
        }

        @keyframes rollAnimation {
            0% { transform: scale(1) rotate(0deg); }
            30% { transform: scale(1.15) rotate(180deg); }
            70% { transform: scale(0.9) rotate(270deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        .dot {
            display: block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #000000 !important;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.6);
        }

        button.roll-btn {
            font-family: 'Permanent Marker', cursive;
            background-color: #ffeb3b;
            color: #6a1b9a;
            border: none;
            padding: 12px 40px;
            font-size: 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        button.roll-btn:hover {
            background-color: #fdd835;
        }

        button.roll-btn:disabled {
            background-color: #b0bec5;
            color: #37474f;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Kleines Pop-Up Menü unten rechts für Farb-Einstellungen */
        .color-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffeb3b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            display: none; /* Standardmäßig unsichtbar */
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            width: 180px;
            text-align: center;
        }

        .color-popup.open {
            display: flex; /* Wird sichtbar bei 'P' */
        }

        .color-popup h3 {
            margin: 0;
            font-size: 0.95rem;
            color: #ffeb3b;
            font-family: 'Segoe UI', sans-serif;
        }

        .color-toggle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .toggle-btn {
            padding: 6px 10px;
            border: 1.5px solid white;
            background: transparent;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: white;
            color: black;
        }

        .color-red { background: radial-gradient(circle at 35% 35%, #ff5252, #ff1744) !important; }
        .color-green { background: radial-gradient(circle at 35% 35%, #69f0ae, #00e676) !important; }
        .color-blue { background: radial-gradient(circle at 35% 35%, #448aff, #2979ff) !important; }
        .color-yellow { background: radial-gradient(circle at 35% 35%, #ffff8d, #ffea00) !important; }
        .color-purple { background: radial-gradient(circle at 35% 35%, #e040fb, #d500f9) !important; }
        .color-orange { background: radial-gradient(circle at 35% 35%, #ffab40, #ff9100) !important; }
    </style>
</head>
<body>

    <header>
        <h1>Online Dice</h1>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h2>Top Streamer</h2>
            <ul class="streamer-list">
                <li><a href="https://tiktok.com/@kriptix01" target="_blank">Kriptix</a></li>
            </ul>
        </div>

        <div class="game-area">
            <div class="controls-top">
                <div>
                    <label for="dice-count">Würfel Anzahl:</label>
                    <select id="dice-count" onchange="updateDiceCount()">
                        <option value="1">1 Würfel</option>
                        <option value="2">2 Würfel</option>
                        <option value="3">3 Würfel</option>
                        <option value="4" selected>4 Würfel</option>
                        <option value="5">5 Würfel</option>
                        <option value="6">6 Würfel</option>
                    </select>
                </div>
                
                <input type="file" id="bg-input" accept="image/*" style="display: none;" onchange="changeBackground(this)">
                <button class="bg-upload-btn" onclick="document.getElementById('bg-input').click()">Hintergrundbild ändern</button>
            </div>

            <div id="dice-container" class="dice-container">
                </div>
            
            <button id="roll-button" class="roll-btn" onclick="startRoll()">Würfeln</button>
        </div>

        <div class="sidebar">
            <h2>Top Streamer</h2>
            <ul class="streamer-list">
                <li><a href="https://tiktok.com/@nexo_142012" target="_blank">nexo_142012</a></li>
            </ul>
        </div>
    </div>

    <div id="color-popup-menu" class="color-popup">
        <h3>Farben (Taste P)</h3>
        <div class="color-toggle-grid">
            <button id="btn-red" class="toggle-btn active" onclick="toggleColor('red')">Rot</button>
            <button id="btn-green" class="toggle-btn active" onclick="toggleColor('green')">Grün</button>
            <button id="btn-blue" class="toggle-btn active" onclick="toggleColor('blue')">Blau</button>
            <button id="btn-yellow" class="toggle-btn active" onclick="toggleColor('yellow')">Gelb</button>
            <button id="btn-purple" class="toggle-btn active" onclick="toggleColor('purple')">Purple</button>
            <button id="btn-orange" class="toggle-btn active" onclick="toggleColor('orange')">Orange</button>
        </div>
    </div>

    <script>
        const allowedColors = {
            red: true, green: true, blue: true, yellow: true, purple: true, orange: true
        };

        // Tastatur-Event: 'P' öffnet/schließt das Farb-Menü unten rechts
        document.addEventListener('keydown', function(event) {
            if (event.key === 'p' || event.key === 'P') {
                const popup = document.getElementById('color-popup-menu');
                popup.classList.toggle('open');
            }
        });

        function changeBackground(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.body.style.backgroundImage = `url('${e.target.result}')`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateDiceCount() {
            const count = parseInt(document.getElementById('dice-count').value);
            const container = document.getElementById('dice-container');
            container.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const dice = document.createElement('div');
                dice.className = 'dice';
                dice.id = `dice-${i}`;
                
                const dot = document.createElement('span');
                dot.className = 'dot';
                dice.appendChild(dot);
                
                container.appendChild(dice);
            }
            applyDiceLogic(false);
        }

        function toggleColor(colorName) {
            const activeCount = Object.values(allowedColors).filter(v => v === true).length;
            if (allowedColors[colorName] && activeCount <= 1) {
                alert("Es muss mindestens eine Farbe aktiv bleiben!");
                return;
            }

            allowedColors[colorName] = !allowedColors[colorName];
            const btn = document.getElementById(`btn-${colorName}`);
            if (allowedColors[colorName]) {
                btn.classList.add('active');
                btn.style.opacity = "1";
            } else {
                btn.classList.remove('active');
                btn.style.opacity = "0.4";
            }
        }

        function startRoll() {
            const container = document.getElementById('dice-container');
            const dices = container.getElementsByClassName('dice');
            const rollBtn = document.getElementById('roll-button');
            
            rollBtn.disabled = true;

            const currentPool = [];
            for (const color in allowedColors) {
                if (allowedColors[color]) currentPool.push(color);
            }

            let intervalCounter = 0;
            const interval = setInterval(() => {
                for (let i = 0; i < dices.length; i++) {
                    dices[i].className = 'dice rolling';
                    const randomColor = currentPool[Math.floor(Math.random() * currentPool.length)];
                    dices[i].classList.add(`color-${randomColor}`);
                }
                intervalCounter++;
                if (intervalCounter > 5) clearInterval(interval);
            }, 80);

            setTimeout(() => {
                applyDiceLogic(true);
                rollBtn.disabled = false;
            }, 600);
        }

        function applyDiceLogic(isRollingAnimationEnd) {
            const container = document.getElementById('dice-container');
            const dices = container.getElementsByClassName('dice');
            const totalDice = dices.length;

            const currentPool = [];
            for (const color in allowedColors) {
                if (allowedColors[color]) currentPool.push(color);
            }

            if (currentPool.length === 0) return;

            let finalColors = [];

            if (totalDice === 4) {
                const rand = Math.random() * 100;

                let matchCount = 1;
                if (rand <= 0.77) {
                    matchCount = 4;
                } else if (rand <= 0.77 + 15) {
                    matchCount = 3;
                } else if (rand <= 0.77 + 15 + 40) {
                    matchCount = 2;
                } else {
                    matchCount = 1;
                }

                const primaryColor = currentPool[Math.floor(Math.random() * currentPool.length)];
                for (let i = 0; i < matchCount; i++) {
                    finalColors.push(primaryColor);
                }

                const remainingPool = currentPool.filter(c => c !== primaryColor);
                while (finalColors.length < totalDice) {
                    if (remainingPool.length > 0) {
                        const randomAltColor = remainingPool[Math.floor(Math.random() * remainingPool.length)];
                        finalColors.push(randomAltColor);
                    } else {
                        finalColors.push(primaryColor);
                    }
                }
            } else {
                for (let i = 0; i < totalDice; i++) {
                    finalColors.push(currentPool[Math.floor(Math.random() * currentPool.length)]);
                }
            }

            for (let i = finalColors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [finalColors[i], finalColors[j]] = [finalColors[j], finalColors[i]];
            }

            for (let i = 0; i < dices.length; i++) {
                dices[i].className = 'dice';
                dices[i].classList.add(`color-${finalColors[i]}`);
            }
        }

        updateDiceCount();
    </script>
</body>
</html>
